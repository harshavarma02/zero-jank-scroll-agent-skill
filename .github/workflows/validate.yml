name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate.mjs
      - run: node skills/zero-jank-scroll/scripts/audit-scroll-source.mjs examples/sticky-steps
